<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bestell App</title>
    <link rel="icon" type="image/x-icon" href="./assets/icons/logo.svg" />

    <link rel="stylesheet" href="./assets/css/standard.css" />
    <link rel="stylesheet" href="./assets/css/variables.css" />
    <link rel="stylesheet" href="./assets/css/fonts.css" />
    <link rel="stylesheet" href="style.css" />

    <script src="./scripts/templates.js"></script>
    <script src="./scripts/db.js"></script>
    <script src="script.js"></script>
  </head>
  <body>
    <header>
      <nav class="nav-bar">
        <div class="logo-text">
          <img src="./assets/icons/logo-with-text.svg" alt="Logo with Text" />
        </div>
        <div class="navigation">
          <img src="./assets/icons/menu.svg" alt="Menu" />
        </div>
      </nav>
    </header>
    <main>
      <section class="main-section">
        <!-- Img from header -->
        <section class="header-section">
          <img
            src="./assets/imgs/hero.png"
            alt="Img from food"
            class="banner-img"
          />
        </section>

        <!-- H1 Section -->
        <section class="info-section">
          <div class="logo-container">
            <img
              src="./assets/imgs/heade-logo.png"
              alt="Logo"
              class="restaurant-logo"
            />
          </div>

          <div class="headling-div">
            <h1>
              <span class="burger-orange">Burger</span
              ><span class="burger-black">House</span>
            </h1>

            <img
              src="./assets/icons/rating.svg"
              alt="rating"
              class="rating-img"
            />
          </div>
          <div class="p-headline-div">
            <p class="p-headling-p-element">
              The best of Burgers, Pizza, and Greens, all in one great place.
            </p>
          </div>
        </section>

        <!-- BURGER -->
        <section class="burger-section">
          <div class="burger-headline">
            <img src="./assets/icons/burger-icon.svg" alt="burger icon" />
            <h2 class="styling-h2">Burger & Sandwiches</h2>
          </div>
        </section>
        <section class="main-content-burger"></section>
        <!-- PIZZA -->
        <section class="pizza-section">
          <div class="pizza-headline">
            <img src="./assets/icons/pizza-icon.svg" alt="Pizza icon" />
            <h2 class="styling-h2">Pizza <span>(30cm)</span></h2>
          </div>
        </section>
        <section class="main-content-pizza"></section>
        <!-- SALAD -->
        <section class="salad-section">
          <div class="salad-headline">
            <img src="./assets/icons/salad-icon.svg" alt="Salad icon" />
            <h2 class="styling-h2">Salad</h2>
          </div>
        </section>
        <section class="main-content-salad"></section>
      </section>
    </main>
    <footer>
      <section class="footer-section">
        <img src="./assets/icons/footer-icon.svg" alt="copyright icon" />
        <a href="#" class="a-tag">Imprint</a>
        <a href="#" class="a-tag">Cokkie Preferences</a>
      </section>
    </footer>
  </body>
</html>
